<div class="list-container">

  <div class="empty" *ngIf="products.length === 0">
    <p>No hay productos para mostrar</p>
  </div>

  <div class="products" *ngIf="products.length > 0">
    <app-product-card
      *ngFor="let product of products"
      [product]="product"
      (deleteProduct)="onDelete(product.id)">
    </app-product-card>
  </div>

</div>
